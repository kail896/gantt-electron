<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>横道图 - 工程项目进度管理软件</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== Menubar ===== -->
<div id="menubar" class="menubar">
  <div class="menu-item">
    <span class="menu-title">文件</span>
    <div class="menu-dropdown">
      <div class="menu-option" data-action="new">新建项目</div>
      <div class="menu-option" data-action="open">打开项目...</div>
      <div class="menu-option" data-action="save">保存</div>
      <div class="menu-option" data-action="save-as">另存为...</div>
      <div class="menu-separator"></div>
      <div class="menu-option" data-action="import">导入 Excel</div>
      <div class="menu-option" data-action="export">导出 Excel</div>
      <div class="menu-option" data-action="export-pdf">导出 PDF</div>
    </div>
  </div>
  <div class="menu-item">
    <span class="menu-title">编辑</span>
    <div class="menu-dropdown">
      <div class="menu-option" data-action="undo">撤销</div>
      <div class="menu-option" data-action="redo">重做</div>
      <div class="menu-separator"></div>
      <div class="menu-option" data-action="add-task">添加任务</div>
      <div class="menu-option" data-action="add-child">添加子任务</div>
      <div class="menu-option" data-action="delete">删除任务</div>
    </div>
  </div>
  <div class="menu-item">
    <span class="menu-title">视图</span>
    <div class="menu-dropdown">
      <div class="menu-option" data-action="zoom-day">日视图</div>
      <div class="menu-option" data-action="zoom-week">周视图</div>
      <div class="menu-option" data-action="zoom-month">月视图</div>
      <div class="menu-separator"></div>
      <div class="menu-option" data-action="expand-all">展开全部</div>
      <div class="menu-option" data-action="collapse-all">折叠全部</div>
      <div class="menu-separator"></div>
      <div class="menu-option" data-action="toggle-today-line">切换今日线</div>
    </div>
  </div>
  <div class="menu-item">
    <span class="menu-title">帮助</span>
    <div class="menu-dropdown">
      <div class="menu-option" data-action="about">关于 横道图</div>
    </div>
  </div>
  <div class="menu-spacer"></div>
  <div class="menu-title" style="font-size:12px;color:#8e9aab;cursor:default;">横道图 Gantt</div>
</div>

<!-- ===== Toolbar ===== -->
<div id="toolbar" class="toolbar">
  <button id="btnAddTask" class="tb-btn" title="添加任务 (Cmd+T)">+ 任务</button>
  <button id="btnAddChild" class="tb-btn" title="添加子任务 (Cmd+Shift+T)">+ 子任务</button>
  <button id="btnDelete" class="tb-btn" title="删除任务 (Delete)">− 删除</button>
  <div class="tb-sep"></div>
  <button id="btnExpandAll" class="tb-btn" title="展开全部">展开</button>
  <button id="btnCollapseAll" class="tb-btn" title="折叠全部">折叠</button>
  <div class="tb-sep"></div>
  <button class="tb-btn zoom-btn active" data-zoom="week" title="周视图">周</button>
  <button class="tb-btn zoom-btn" data-zoom="day" title="日视图">日</button>
  <button class="tb-btn zoom-btn" data-zoom="month" title="月视图">月</button>
  <div class="tb-sep"></div>
  <button id="btnTodayLine" class="tb-btn tb-toggle active" title="切换今日线显示">今日线</button>
  <div class="tb-sep"></div>
  <button id="btnImport" class="tb-btn" title="导入 Excel">导入 Excel</button>
  <button id="btnExport" class="tb-btn" title="导出 Excel">导出 Excel</button>
  <button id="btnExportPdf" class="tb-btn" title="导出 PDF">导出 PDF</button>
</div>

<!-- ===== Main Content ===== -->
<div id="mainContent" class="main-content">
  <!-- Left Panel: Task Table -->
  <div id="tablePanel" class="table-panel">
    <div class="table-scroll">
      <table id="taskTable">
        <colgroup id="colgroup"></colgroup>
        <thead id="tableHead"></thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>
  </div>
  <!-- Resize Handle -->
  <div id="resizeHandle" class="resize-handle"></div>
  <!-- Right Panel: Gantt Chart -->
  <div id="ganttPanel" class="gantt-panel">
    <div id="ganttTimeline" class="gantt-timeline"></div>
    <div id="ganttBody" class="gantt-body"></div>
  </div>
</div>

<!-- ===== Status Bar ===== -->
<div id="statusBar" class="status-bar">
  <span id="taskStatus" class="status-item" style="flex:1;">准备就绪</span>
  <span id="taskCount" class="status-item">0 项</span>
  <span class="status-sep"></span>
  <span id="fileStatus" class="status-item">未命名项目</span>
  <span class="status-sep"></span>
  <span id="zoomStatus" class="status-item">周视图</span>
  <span class="status-sep"></span>
  <span id="dateStatus" class="status-item"></span>
  <span class="status-sep"></span>
  <span id="versionStatus" class="status-item">v1.0.010</span>
</div>

<!-- ===== About Modal ===== -->
<div id="aboutModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <span>关于 横道图</span>
      <span id="aboutModalClose" class="modal-close">&times;</span>
    </div>
    <div class="modal-body">
      <p style="font-size:18px;font-weight:600;margin:0 0 8px 0;">横道图 Gantt</p>
      <p style="color:#666;margin:0 0 4px 0;">版本 <span id="aboutVersion">v1.0.010</span></p>
      <p style="color:#666;margin:0 0 4px 0;">工程项目进度管理软件</p>
      <p style="color:#999;font-size:12px;margin:12px 0 0 0;">基于 Electron 构建</p>
    </div>
    <div class="modal-footer">
      <button id="aboutModalOk" class="modal-btn">确定</button>
    </div>
  </div>
</div>

<!-- ===== Context Menu ===== -->
<div id="ctxMenu" class="ctx-menu" style="display:none;">
  <div class="ctx-option" data-action="add-task">添加任务</div>
  <div class="ctx-option" data-action="add-child">添加子任务</div>
  <div class="ctx-separator"></div>
  <div class="ctx-option" data-action="delete">删除任务</div>
</div>

<!-- ===== Hidden File Input ===== -->
<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">

<!-- ===== Scripts ===== -->
<script src="node_modules/xlsx/dist/xlsx.full.min.js"></script>
<script src="node_modules/exceljs/dist/exceljs.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
